    <script>

        const API_URL = "http://localhost:8080";

        // 1. Fetch OS
        async function fetchOS() {
            try {
                document.getElementById('os-data').innerText = "Fetching server data...";
                const res = await fetch(`${API_URL}/os-status`);
                const data = await res.json();
                document.getElementById('os-data').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('os-data').innerText = "Server not reachable!";
            }
        }

        // 2. Load Chat
        async function loadChat() {
            const res = await fetch(`${API_URL}/send-chat`);
            const data = await res.json();
            document.getElementById('chat-box').innerHTML = data.logs.map(m => `<div>${m.user}: ${m.message}</div>`).join('');
        }

        // 3. Process Payment
        async function processPayment() {
            const res = await fetch(`${API_URL}/process-payment`);
            const data = await res.json();

            // document.getElementById('payment-box').innerText = data.message;
            // Disable the button once the payment is complete.

            const payBtn = document.getElementById('pay-btn');
            document.getElementById('payment-box').innerText = data.message;


            if (data.message.includes("Already Paid")) {
                payBtn.classList.remove('btn-success');
                payBtn.classList.add('btn-danger');
            }
        }

        // window.onload = fetchOS;
    </script>
