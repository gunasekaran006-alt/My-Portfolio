<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Backend Lab - Day 62 & 63</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; }
        .lab-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin-top: 20px; }
    </style>
</head>


<script>
    // This is the bridge (Frontend to Backend Connection)
    const API_URL = "http://localhost:8080"; 

    // This function fetches data from your backend
    async function fetchOS() {
        try {
            // Sending a request to your Node.js server
            const res = await fetch(`${API_URL}/os-status`);
            const data = await res.json();
            
            // Updating the UI with the backend data
            document.getElementById('os-data').innerText = JSON.stringify(data, null, 2);
        } catch (error) {
            console.error("Connection failed:", error);
            document.getElementById('os-data').innerText = "Server not reachable!";
        }
    }

    // 2. Trigger FS 
    async function triggerFS() {
        const res = await fetch(`${API_URL}/create-file`);
        const data = await res.json();
        document.getElementById('status-msg').innerText = data.message;
    }

    // 3. Trigger Events 
    async function triggerEvents() {
        const res = await fetch(`${API_URL}/test-events`);
        const data = await res.json();
        document.getElementById('status-msg').innerText = data.message;
    }

    window.onload = fetchOS;
</script>



<body>
    <div class="container mt-5">
        <h2 class="text-center text-info">Backend Lab: Node.js Core Modules</h2>
        
        <div class="lab-card">
            <h4>1. OS Module (Diagnostics)</h4>
            <pre id="os-data" class="bg-black p-3 rounded text-success">Loading...</pre>
            <button class="btn btn-info" onclick="fetchOS()">Refresh OS Status</button>
        </div>

        <div class="lab-card">
            <h4>2. FS & Events (Actions)</h4>
            <button class="btn btn-warning" onclick="triggerFS()">Create File</button>
            <button class="btn btn-warning" onclick="triggerEvents()">Test Events</button>
            <p id="status-msg" class="mt-3"></p>
        </div>
    </div>

    
</body>
</html>
